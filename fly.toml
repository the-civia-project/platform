app = "civia-platform-api"
primary_region = "fra"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 3001
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
max_machines_running = 1

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"

[env]
RUST_LOG = "info"
