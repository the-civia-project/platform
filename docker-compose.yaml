services:
  pg:
    image: postgres:18
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pg_data:/var/lib/postgresql

  # S3-compatible object store for avatars (local dev). The API reads S3_* from the
  # repo root .env — point all three endpoints at http://localhost:9000. Clients never
  # talk to MinIO directly; avatars are served via the platform API.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  # One-shot: creates the private avatars bucket (idempotent).
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; do sleep 1; done
        mc mb --ignore-existing local/avatars

volumes:
  pg_data:
  minio_data:
